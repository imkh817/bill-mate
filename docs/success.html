<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설치 완료 — bill-mate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 26px; color: #1a1a1a; margin-bottom: 12px; }
    p { color: #555; line-height: 1.7; margin-bottom: 24px; }
    .hint {
      background: #f0f4ff;
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      color: #3a5bbf;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>설치가 완료됐습니다!</h1>
    <p>bill-mate가 워크스페이스에 추가되었습니다.<br>
       Slack을 열고 앱에게 직접 메시지를 보내보세요!</p>
    <div class="hint">
      Slack 앱 목록에서 <strong>bill-mate</strong>를 찾아<br>
      메시지를 보내면 바로 시작할 수 있어요.
    </div>
  </div>
</body>
</html>
