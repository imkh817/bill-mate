<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bill-mate — Slack 구독 관리 봇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 28px; color: #1a1a1a; margin-bottom: 12px; }
    p { color: #555; line-height: 1.6; margin-bottom: 32px; }
    .add-to-slack {
      display: inline-block;
      text-decoration: none;
    }
    .add-to-slack img {
      height: 48px;
    }
    .features {
      margin-top: 36px;
      text-align: left;
      color: #444;
      font-size: 14px;
      line-height: 2;
    }
    .features li { list-style: none; }
    .features li::before { content: "✅ "; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">💳</div>
    <h1>bill-mate</h1>
    <p>Slack에서 SaaS 구독을 관리하세요.<br>결제일 알림, 월간 리포트를 자동으로.</p>

    <a class="add-to-slack"
       href="https://slack.com/oauth/v2/authorize?client_id=10727720251554.10725679845734&scope=chat:write,im:write,im:history,im:read,commands">
      <img alt="Add to Slack"
           src="https://platform.slack-edge.com/img/add_to_slack.png"
           srcset="https://platform.slack-edge.com/img/add_to_slack.png 1x,
                   https://platform.slack-edge.com/img/add_to_slack@2x.png 2x" />
    </a>

    <ul class="features">
      <li>구독 등록 및 관리</li>
      <li>결제일 D-1/D-3/D-7 알림</li>
      <li>월간 지출 리포트 자동 발송</li>
      <li>팀 구독 공유 및 분담 관리</li>
    </ul>
  </div>
</body>
</html>
